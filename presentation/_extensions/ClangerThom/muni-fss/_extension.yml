title: MUNI FSS Presentation Theme
author: MUNI FSS
version: 0.1.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      theme: [default, muni-fss.scss]
      css: muni-fss-fonts.css
      slide-number: false
      progress: false
      navigation-mode: linear
      controls: false
      center: false
      transition: none
      background-transition: none
      width: 1280
      height: 720
      margin: 0.04
      include-after-body: muni-fss-init.html
      date-format: "DD-MM-YYYY"
      filters:
        - muni-fss.lua
